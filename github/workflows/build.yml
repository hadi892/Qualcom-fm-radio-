name: Build & Release Standalone Qualcomm FM Radio APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 'current'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Qualcomm-FM-Radio-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Qualcomm-FM-Radio-Release-APKs
          path: app/build/outputs/apk/release/*.apk

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Qualcomm-FM-Radio-Debug-APK
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.apk
          title: "Qualcomm FM Radio ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
